      <!-- ═══ PAGE: TEMAS ═══ -->
      <div class="page" id="page-temas">

        <!-- ── Top bar ── -->
        <div class="temas-top-bar">
          <div class="temas-top-bar-left">
            <button id="temas-back-btn" class="btn btn-ghost btn-sm" onclick="temasGoBack()" style="display:none;">← Volver</button>
            <button id="temas-back-general-btn" class="btn btn-ghost btn-sm" onclick="openFromHub('general')" style="display:none;">← General</button>
            <span class="temas-page-title" id="temas-page-title">📖 Temas del Curso</span>
          </div>
          <div class="temas-btn-group">
            <button class="btn btn-primary btn-sm" id="temas-add-topic-btn" onclick="openTopicModal()" style="display:none;">+ Agregar Tema</button>
            <button class="btn btn-primary btn-sm" id="temas-add-apartado-btn" onclick="openApartadoModal()" style="display:none;">+ Apartado</button>
          </div>
        </div>

        <!-- ── LEVEL 1: Hub (materias del semestre) ── -->
        <div id="temas-hub-view">
          <div id="temas-hub-grid"></div>
        </div>

        <!-- ── LEVEL 2: Apartados de una materia ── -->
        <div id="temas-materia-view" style="display:none;">
          <div id="temas-materia-grid"></div>
        </div>

        <!-- ── LEVEL 3: Temas de un apartado ── -->
        <div id="temas-apartado-view" style="display:none;">
          <div class="card" style="margin-bottom:14px;">
            <div class="card-header">
              <span class="card-title" style="font-size:12px;">📊 Carga — Próximos 14 días</span>
              <button class="btn btn-ghost btn-sm" id="planner-reschedule-btn" onclick="plannerRescheduleUI()" style="font-size:11px;">↻ Reagendar</button>
            </div>
            <div class="card-body" style="padding:10px 14px 12px;"><div id="planner-timeline"></div></div>
          </div>
          <div class="card" style="margin-bottom:14px;">
            <div class="card-header" style="cursor:pointer;user-select:none;" onclick="_toggleReviewQueue(this)">
              <span class="card-title">🔁 Repasos Pendientes</span>
              <span id="review-queue-chevron" style="font-size:11px;color:var(--text3);">▾ ocultar</span>
            </div>
            <div id="planner-review-queue"></div>
          </div>
          <div id="topics-container"></div>
        </div>

      </div>

      <!-- ═══ TOPIC DETAIL DRAWER ═══ -->
      <div id="topic-detail-backdrop" onclick="closeTopicDetail()"
        style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;backdrop-filter:blur(3px);"></div>
      <div id="topic-detail-drawer"
        style="display:none;position:fixed;top:0;right:0;bottom:0;width:min(480px,100vw);
          background:var(--surface);border-left:1px solid var(--border);z-index:501;
          overflow-y:auto;box-shadow:-8px 0 40px rgba(0,0,0,.4);
          transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);">
        <div id="topic-detail-content" style="padding:20px 18px 80px;"></div>
      </div>

      <!-- ═══ APARTADO MODAL ═══ -->
      <div class="modal-overlay" id="modal-apartado">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title">📁 Nuevo Apartado</span>
            <button class="modal-close" onclick="closeModal('modal-apartado')">✕</button>
          </div>
          <div class="form-group">
            <label class="form-label" for="apartado-name">Nombre del apartado</label>
            <input type="text" id="apartado-name" class="form-input" placeholder="Ej: Laboratorio, Hojas de Trabajo" autocomplete="off">
          </div>
          <div class="form-actions">
            <button class="btn btn-ghost" onclick="closeModal('modal-apartado')">Cancelar</button>
            <button class="btn btn-primary" onclick="saveApartado()">💾 Crear Apartado</button>
          </div>
        </div>
      </div>

      <!-- ═══ PAGE: ESTADÍSTICAS ═══ -->
