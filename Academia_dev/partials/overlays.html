<div id="comp-popup" style="position:fixed;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;z-index:500;min-width:180px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);">
  <div style="font-size:10px;color:var(--text3);margin-bottom:8px;font-family:'Space Mono',monospace;letter-spacing:1px;">% COMPRENDIDO</div>
  <input type="range" id="comp-slider" min="0" max="100" step="5" style="width:100%;accent-color:var(--accent);cursor:pointer;">
  <div style="display:flex;justify-content:space-between;margin-top:6px;">
    <span style="font-size:11px;color:var(--text3);">0%</span>
    <span style="font-size:14px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;" id="comp-val">0%</span>
    <span style="font-size:11px;color:var(--text3);">100%</span>
  </div>
  <button class="btn btn-primary btn-sm" style="width:100%;margin-top:10px;justify-content:center;" onclick="applyComp()">Aplicar</button>
</div>

<!-- EXAM MODE OVERLAY -->
<div class="exam-mode-overlay" id="exam-overlay">
  <div style="text-align:center;margin-bottom:20px;">
    <div style="font-size:11px;font-family:'Space Mono',monospace;color:var(--red);letter-spacing:3px;margin-bottom:8px;">⏱️ MODO EXAMEN</div>
    <div class="exam-countdown" id="exam-countdown">90:00</div>
    <div style="font-size:13px;color:var(--text2);margin-top:6px;" id="exam-subject-label">—</div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-primary" id="exam-toggle-btn" onclick="examToggle()">▶ Iniciar</button>
    <button class="btn btn-ghost" onclick="examReset()">↺ Reset</button>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:var(--text3);">min:</span>
      <input type="number" id="exam-min-input" value="90" min="1" max="300" class="grade-input" style="width:60px;" onchange="examReset()">
    </div>
    <select id="exam-mat-sel" class="form-select" style="width:auto;padding:6px 10px;font-size:12px;" onchange="updateExamSubjectLabel()"></select>
    <button class="btn btn-danger" onclick="closeExamMode()">✕ Salir</button>
  </div>
  <div class="exam-notes-area">
    <div style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:8px;">📝 NOTAS DE LA MATERIA</div>
    <div id="exam-notes-display" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;min-height:80px;white-space:pre-wrap;"></div>
  </div>
</div>

<!-- ═══ MODAL: VISOR PDF ═══ -->
<div id="modal-pdf-view" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);flex-direction:column;">
  <!-- Header -->
  <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;">
    <span style="font-size:13px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent2);">📑</span>
    <span id="pdf-modal-name" style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">—</span>
    <button onclick="closePDFModal()" style="background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:5px 12px;color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;">✕ Cerrar</button>
  </div>
  <!-- Canvas container — PDF.js renderiza aquí -->
  <div style="flex:1;overflow-y:auto;overflow-x:hidden;background:#525659;padding:12px;">
    <div id="pdf-canvas-container" style="width:100%;min-height:200px;"></div>
  </div>
  <!-- Navegación de páginas -->
  <div id="pdf-page-nav" style="display:none;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;">
    <button onclick="pdfPrevPage()" style="background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 14px;color:var(--text);cursor:pointer;font-size:13px;">◀ Anterior</button>
    <span style="font-size:12px;color:var(--text2);font-family:'Space Mono',monospace;">
      Página <span id="pdf-page-current">1</span> / <span id="pdf-page-total">1</span>
    </span>
    <button onclick="pdfNextPage()" style="background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:6px 14px;color:var(--text);cursor:pointer;font-size:13px;">Siguiente ▶</button>
  </div>
</div>
