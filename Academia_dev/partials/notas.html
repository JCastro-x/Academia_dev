            <div class="notes-images-strip" id="notes-images-strip" style="display:none;"></div>

            <span style="font-size:13px;font-weight:700;" id="canvas-note-title-lbl">Dibujo</span>

            <!-- Colors -->
            <div style="display:flex;gap:5px;align-items:center;" id="canvas-colors">
              <button class="canvas-color-btn active" data-color="#e2e8f0" style="background:#e2e8f0;" onclick="setCanvasColor(this,'#e2e8f0')"></button>

              <button class="canvas-color-btn" data-color="#fb923c" style="background:#fb923c;" onclick="setCanvasColor(this,'#fb923c')"></button>
              <button class="canvas-color-btn" data-color="#facc15" style="background:#facc15;" onclick="setCanvasColor(this,'#facc15')"></button>
              <button class="canvas-color-btn" data-color="#4ade80" style="background:#4ade80;" onclick="setCanvasColor(this,'#4ade80')"></button>

              <button class="canvas-color-btn" data-color="#a78bfa" style="background:#a78bfa;" onclick="setCanvasColor(this,'#a78bfa')"></button>
              <button class="canvas-color-btn" data-color="#f472b6" style="background:#f472b6;" onclick="setCanvasColor(this,'#f472b6')"></button>
            </div>
            <div style="width:1px;height:20px;background:var(--border);margin:0 3px;"></div>
            <!-- Brush sizes -->
            <div style="display:flex;gap:6px;align-items:center;" id="canvas-sizes">
              <div class="canvas-size-btn active" data-size="2"  style="width:6px;height:6px;"  onclick="setCanvasSize(this,2)"></div>
              <div class="canvas-size-btn" data-size="5"  style="width:10px;height:10px;" onclick="setCanvasSize(this,5)"></div>
              <div class="canvas-size-btn" data-size="10" style="width:16px;height:16px;" onclick="setCanvasSize(this,10)"></div>
              <div class="canvas-size-btn" data-size="20" style="width:22px;height:22px;" onclick="setCanvasSize(this,20)"></div>
            </div>

              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-line-btn" onclick="setCanvasTool(this,'line')" title="Línea recta">╱</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-rect-btn" onclick="setCanvasTool(this,'rect')" title="Rectángulo">▭</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-circle-btn" onclick="setCanvasTool(this,'circle')" title="Círculo">⭕</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-text-btn" onclick="setCanvasTool(this,'text')" title="Texto — haz clic en el canvas para escribir">T</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-move-btn" onclick="setCanvasTool(this,'move')" title="Mover imagen — arrastra las imágenes del canvas">↕ Mover</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn" id="tool-ai-btn" onclick="setCanvasTool(this,'ai')" title="Auto-corrección de formas: dibuja libremente y se convierte en línea/círculo/rectángulo" style="color:var(--accent);">🪄 Auto</button>

            <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-canvas')">✕</button>

                <div data-fc="#8b5cf6" onclick="selectFolderColor(this)" class="folder-color-opt" style="width:20px;height:20px;border-radius:50%;background:#8b5cf6;cursor:pointer;border:3px solid transparent;"></div>
