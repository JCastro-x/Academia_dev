      <!-- ═══ PAGE: NOTAS ═══ -->
      <div class="page" id="page-notas">

        <!-- ── Top bar ── -->
        <div class="notes-top-bar">
          <div class="notes-top-bar-left">
            <button id="notes-back-btn" class="btn btn-ghost btn-sm" data-action="notes-go-back" style="display:none;">← Volver</button>
            <span class="notes-page-title" id="notes-page-title">📝 Bloc de Notas</span>
          </div>
          <div class="notes-btn-group">
            <button class="btn btn-ghost btn-sm" data-action="open-modal" data-target="modal-notes-search">🔍 Buscar</button>
            <button class="btn btn-ghost btn-sm" data-action="notes-new-note">📄 Nueva nota</button>
            <button class="btn btn-ghost btn-sm" data-action="notes-new-drawing">🎨 Nuevo dibujo</button>
            <button class="btn btn-primary btn-sm" data-action="open-new-folder-modal">📁 Carpeta</button>
          </div>
        </div>

        <!-- ── LEVEL 1: Hub (carpetas / materias) ── -->
        <div id="notes-hub-view">
          <div id="notes-hub-grid"></div>
        </div>

        <!-- ── LEVEL 2: Notas de una carpeta como tarjetas ── -->
        <div id="notes-folder-view" style="display:none;">
          <div id="notes-folder-grid"></div>
        </div>

        <!-- Hidden compat -->
        <select id="notes-mat-sel" class="pom-hidden" data-action="render-notes-page"></select>
        <div id="notes-container" class="pom-hidden"></div>
        <!-- legacy layout hidden but kept for compat functions -->
        <div class="notes-pro-layout pom-hidden" id="notes-pro-layout" style="position:absolute;pointer-events:none;opacity:0;"></div>
      </div>

      <!-- ══════════════════════════════════════════
           EDITOR FLOTANTE (modal de nota)
      ═══════════════════════════════════════════ -->
      <div id="note-editor-backdrop" class="note-editor-backdrop" data-action="close-note-editor"></div>

      <div id="note-editor-modal" class="note-editor-modal">

        <!-- Modal header -->
        <div class="note-editor-header">
          <input type="text" id="notes-title-inp" class="form-input note-editor-title-input"
            placeholder="Título de la nota..." autocomplete="off" data-action="notes-title-input">
          <div class="note-editor-header-tools">
            <button class="note-editor-close-btn" data-action="close-note-editor">✕</button>
            <span class="note-editor-autosave" id="notes-autosave-indicator">—</span>
            <button class="btn btn-ghost btn-sm" data-action="expand-current-note" title="Pantalla completa">⛶</button>
            <button class="btn btn-ghost btn-sm" data-action="export-current-note">⬇️</button>
            <button class="btn btn-danger btn-sm" data-action="delete-current-note">🗑️</button>
          </div>
        </div>

        <!-- Meta row -->
        <div id="notes-title-wrap" class="note-editor-meta">
          <div class="note-editor-meta-selects">
            <select id="notes-folder-sel-editor" class="form-select note-editor-meta-select" data-action="note-folder-change">
              <option value="">— Sin carpeta —</option>
            </select>
            <select id="notes-mat-sel-editor" class="form-select note-editor-meta-select" data-action="note-mat-change">
              <option value="">— Sin materia —</option>
            </select>
          </div>
          <span class="note-editor-timestamp" id="notes-timestamp">—</span>
          <div class="note-editor-meta-actions">
            <button class="btn btn-ghost btn-sm" data-action="open-canvas" title="Abrir canvas">🎨</button>
            <label class="btn btn-ghost btn-sm" title="Escanear PDF/imagen">
              📄 Escanear<input type="file" accept=".pdf,image/*" multiple class="pom-hidden" data-action="scan-document">
            </label>
            <label class="btn btn-ghost btn-sm" title="Adjuntar imágenes">
              🖼️<input type="file" accept="image/*" multiple class="pom-hidden" data-action="attach-images">
            </label>
            <label class="btn btn-ghost btn-sm">
              📑 PDF<input type="file" accept=".pdf" class="pom-hidden" data-action="load-pdf">
            </label>
          </div>
          <div class="note-editor-tags-wrap">
            <span class="note-editor-tags-label">🏷</span>
            <input type="text" id="notes-tags-inp" class="form-input note-editor-tags-input"
              placeholder="tags, separados, por coma"
              autocomplete="off" data-action="note-tags-input">
            <div id="notes-tags-display" class="note-editor-tags-display"></div>
          </div>
        </div>

        <!-- RTE toolbar -->
        <div class="notes-richtext-toolbar" id="notes-rte-toolbar">
          <select class="rte-select" id="rte-heading" title="Estilo" data-action="rte-apply-heading">
            <option value="p">Párrafo</option>
            <option value="h1">H1</option>
            <option value="h2">H2</option>
            <option value="h3">H3</option>
          </select>
          <div class="rte-sep"></div>
          <button class="rte-btn" id="rte-bold"          data-action="rte-exec" data-command="bold"            title="Negrita"><b>B</b></button>
          <button class="rte-btn" id="rte-italic"        data-action="rte-exec" data-command="italic"          title="Itálica"><i>I</i></button>
          <button class="rte-btn" id="rte-underline"     data-action="rte-exec" data-command="underline"       title="Subrayado"><u>U</u></button>
          <button class="rte-btn" id="rte-strikethrough" data-action="rte-exec" data-command="strikeThrough"   title="Tachado">S</button>
          <div class="rte-sep"></div>
          <button class="rte-btn" data-action="rte-exec" data-command="insertUnorderedList" title="Lista">☰</button>
          <button class="rte-btn" data-action="rte-exec" data-command="insertOrderedList"   title="Numerada">①</button>
          <button class="rte-btn" data-action="rte-exec" data-command="formatBlock" data-value="blockquote" title="Cita">❝</button>
          <div class="rte-sep"></div>
          <button class="rte-btn" data-action="rte-copy-formatted">📋</button>
          <button class="rte-btn" data-action="rte-copy-plain">📄</button>
        </div>

        <!-- Editor area (scrollable) -->
        <div class="note-editor-area">
          <div class="notes-richtext-editor" id="notes-rte"
            contenteditable="true"
            data-placeholder="Escribe tus apuntes aquí..."
            data-action="rte-input"
            data-keydown-action="rte-keydown"
            data-mouseup-action="rte-update-toolbar"
            data-keyup-action="rte-update-toolbar"></div>

          <textarea class="notes-main-textarea" id="notes-main-ta"
            placeholder="Escribe tus apuntes aquí..." data-action="notes-input"></textarea>

          <div class="notes-images-strip" id="notes-images-strip"></div>
          <div class="notes-wordcount"    id="notes-wordcount"></div>

          <!-- Drawing view -->
          <div class="notes-drawing-area" id="notes-drawing-area">
            <div class="canvas-toolbar canvas-toolbar-inline" id="canvas-toolbar-inline">
              <span class="canvas-toolbar-label">Vista previa del dibujo</span>
              <button class="btn btn-primary btn-sm" data-action="open-canvas">✏️ Editar dibujo</button>
            </div>
            <div class="canvas-preview-container">
              <img id="notes-drawing-preview" class="canvas-preview-img" src="" alt="dibujo">
            </div>
          </div>

          <div id="notes-pdf-strip" class="notes-pdf-strip"></div>

          <!-- Empty state inside modal (shouldn't normally show) -->
          <div id="notes-empty-state" class="notes-empty-state">
            <div class="notes-empty-state-icon">📝</div>
            <div class="notes-empty-state-text">Sin nota seleccionada</div>
            <div class="notes-empty-state-actions">
              <button class="btn btn-primary btn-sm" data-action="notes-new-note">📄 Nueva nota</button>
              <button class="btn btn-ghost btn-sm"   data-action="notes-new-drawing">🎨 Nuevo dibujo</button>
            </div>
          </div>
        </div>

        <!-- Toolbar de nota (bottom, para dibujos) -->
        <div class="notes-editor-toolbar" id="notes-toolbar"></div>
      </div>

      <!-- ═══ CANVAS MODAL ═══ -->
      <div class="modal-overlay modal-canvas-overlay" id="modal-canvas">
        <div class="modal modal-canvas-full">
          <div class="canvas-toolbar canvas-toolbar-modal" id="canvas-toolbar-modal">
            <span class="canvas-note-title" id="canvas-note-title-lbl">Dibujo</span>
            <div class="canvas-toolbar-divider"></div>
            <div class="canvas-colors" id="canvas-colors">
              <div class="canvas-color-btn active" data-action="set-canvas-color" data-color="#e2e8f0" style="background:#e2e8f0;"></div>
              <div class="canvas-color-btn" data-action="set-canvas-color" data-color="#f87171" style="background:#f87171;"></div>
              <div class="canvas-color-btn" data-action="set-canvas-color" data-color="#fbbf24" style="background:#fbbf24;"></div>
              <div class="canvas-color-btn" data-action="set-canvas-color" data-color="#4ade80" style="background:#4ade80;"></div>
              <div class="canvas-color-btn" data-action="set-canvas-color" data-color="#60a5fa" style="background:#60a5fa;"></div>
              <div class="canvas-color-btn" data-action="set-canvas-color" data-color="#c084fc" style="background:#c084fc;"></div>
            </div>
            <div class="canvas-sizes" id="canvas-sizes">
              <div class="canvas-size-btn active" data-action="set-canvas-size" data-size="2"  style="width:6px;height:6px;"></div>
              <div class="canvas-size-btn" data-action="set-canvas-size" data-size="5"  style="width:10px;height:10px;"></div>
              <div class="canvas-size-btn" data-action="set-canvas-size" data-size="10" style="width:16px;height:16px;"></div>
              <div class="canvas-size-btn" data-action="set-canvas-size" data-size="20" style="width:22px;height:22px;"></div>
            </div>
            <div class="canvas-toolbar-divider"></div>
            <div class="canvas-tools">
              <button class="btn btn-ghost btn-sm canvas-tool-btn active" id="tool-pen-btn"    data-action="set-canvas-tool" data-tool="pen"    title="Lápiz">✏️</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-line-btn"   data-action="set-canvas-tool" data-tool="line"   title="Línea">╱</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-rect-btn"   data-action="set-canvas-tool" data-tool="rect"   title="Rect">▭</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-circle-btn" data-action="set-canvas-tool" data-tool="circle" title="Círculo">⭕</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-text-btn"   data-action="set-canvas-tool" data-tool="text"   title="Texto">T</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-move-btn"   data-action="set-canvas-tool" data-tool="move"   title="Mover">↕ Mover</button>
              <button class="btn btn-ghost btn-sm canvas-tool-btn"        id="tool-ai-btn"     data-action="set-canvas-tool" data-tool="ai"     data-ai="true">🪄 Auto</button>
            </div>
            <div class="canvas-toolbar-divider"></div>
            <button id="canvas-eraser-btn" class="btn btn-ghost btn-sm" data-action="toggle-canvas-eraser">🧹</button>
            <button class="btn btn-ghost btn-sm" data-action="undo-canvas">↩️</button>
            <button class="btn btn-ghost btn-sm" data-action="clear-canvas">🗑️</button>
            <label class="btn btn-ghost btn-sm">🖼️ Imagen<input type="file" accept="image/*" class="pom-hidden" data-action="paste-image-canvas"></label>
            <div style="flex:1;"></div>
            <span class="canvas-hint">Ctrl+V para pegar imagen</span>
            <button class="btn btn-primary btn-sm" data-action="save-canvas-and-close">💾 Guardar</button>
            <button class="btn btn-ghost btn-sm" data-action="close-modal" data-target="modal-canvas">✕</button>
          </div>
          <canvas id="notes-canvas" class="canvas-canvas"></canvas>
        </div>
      </div>

      <!-- ═══ NEW FOLDER MODAL ═══ -->
      <div class="modal-overlay" id="modal-new-folder">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="new-folder-modal-title">📁 Nueva Carpeta</span>
            <button class="modal-close" data-action="close-modal" data-target="modal-new-folder">✕</button>
          </div>
          <div class="scanner-modal">
            <input type="text" id="new-folder-name" class="form-input" placeholder="Nombre de la carpeta..." autocomplete="off">
            <div class="note-editor-meta">
              <span style="font-size:12px;color:var(--text2);">Icono:</span>
              <div class="folder-icon-picker" id="folder-icon-picker">
                <span data-icon="📁" data-action="select-folder-icon" class="folder-icon-opt active">📁</span>
                <span data-icon="📚" data-action="select-folder-icon" class="folder-icon-opt">📚</span>
                <span data-icon="🗂️" data-action="select-folder-icon" class="folder-icon-opt">🗂️</span>
                <span data-icon="📌" data-action="select-folder-icon" class="folder-icon-opt">📌</span>
                <span data-icon="🧪" data-action="select-folder-icon" class="folder-icon-opt">🧪</span>
                <span data-icon="💡" data-action="select-folder-icon" class="folder-icon-opt">💡</span>
                <span data-icon="🎯" data-action="select-folder-icon" class="folder-icon-opt">🎯</span>
                <span data-icon="⚡" data-action="select-folder-icon" class="folder-icon-opt">⚡</span>
              </div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="font-size:12px;color:var(--text2);">Color:</span>
              <div class="folder-color-picker" id="folder-color-picker">
                <div data-fc="#6366f1" data-action="select-folder-color" class="folder-color-opt active" style="background:#6366f1;"></div>
                <div data-fc="#3b82f6" data-action="select-folder-color" class="folder-color-opt" style="background:#3b82f6;"></div>
                <div data-fc="#10b981" data-action="select-folder-color" class="folder-color-opt" style="background:#10b981;"></div>
                <div data-fc="#f59e0b" data-action="select-folder-color" class="folder-color-opt" style="background:#f59e0b;"></div>
                <div data-fc="#ef4444" data-action="select-folder-color" class="folder-color-opt" style="background:#ef4444;"></div>
                <div data-fc="#8b5cf6" data-action="select-folder-color" class="folder-color-opt" style="background:#8b5cf6;"></div>
              </div>
            </div>
            <div class="scanner-actions">
              <button class="btn btn-ghost btn-sm" data-action="close-modal" data-target="modal-new-folder">Cancelar</button>
              <button class="btn btn-primary btn-sm" data-action="save-new-folder" id="save-folder-btn">Crear carpeta</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ LIGHTBOX ═══ -->
      <div class="notes-lightbox" id="notes-lightbox" data-action="close-lightbox">
        <button class="notes-lightbox-close" data-action="close-lightbox">✕</button>
        <div class="notes-lightbox-content" data-stop-propagation="true">
          <img id="notes-lightbox-img" src="" alt="imagen ampliada">
        </div>
      </div>

      <!-- ═══ SCANNER PROGRESS MODAL ═══ -->
      <div class="modal-overlay scanner-modal-overlay" id="modal-scanner">
        <div class="modal scanner-modal">
          <div class="scanner-title">📄 Escanear Documento</div>
          <div class="scanner-filename" id="scanner-file-name">Procesando...</div>
          <div class="scanner-progress-container">
            <div id="scanner-progress-bar" class="scanner-progress-bar"></div>
          </div>
          <div class="scanner-status" id="scanner-status">Iniciando...</div>
          <div class="scanner-actions">
            <button class="btn btn-ghost btn-sm" id="scanner-cancel-btn" data-action="cancel-scan">Cancelar</button>
          </div>
        </div>
      </div>
