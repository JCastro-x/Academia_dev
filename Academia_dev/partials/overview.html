      <div class="page active" id="page-overview">

        <!-- Header: greeting + small clock (top-right) -->
        <div class="mc-header">
          <div class="mc-greeting">
            <div style="display:none;" id="ov-date"></div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <div style="font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.2;" id="ov-greeting"></div>
              <span id="ov-wave-hand" class="ov-wave-emoji" style="font-size:24px;line-height:1;">👋</span>
            </div>
            <div style="display:none;" id="ov-sub"></div>
          </div>

          <!-- Small clock + date + Zen Mode toggle -->
          <div class="ov-clock-block" style="gap:12px;">
            <div id="ov-clock-icon" style="font-size:18px;line-height:1;">☀️</div>
            <div id="ov-clock" style="font-family:'Inter',sans-serif;font-size:16px;font-weight:600;color:var(--text2);letter-spacing:0.5px;line-height:1;">—</div>
            <div id="ov-clock-ampm" style="font-family:'Inter',sans-serif;font-size:12px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;align-self:flex-end;margin-bottom:2px;">—</div>
            <div class="ov-clock-sep" style="color:var(--border);margin:0 4px;">|</div>
            <div id="ov-date-short" style="font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--text2);letter-spacing:0.3px;line-height:1;">—</div>
            <div class="ov-clock-sep" style="color:var(--border);margin:0 4px;">|</div>
            <button id="zen-mode-toggle-btn" onclick="toggleZenMode()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;">✕ Ocultar</button>
          </div>
        </div>

        <!-- 📅 AGENDA SEMANAL RODANTE -->
        <div class="card" style="margin-bottom:20px;" id="agenda-card">
          <div class="card-header" style="padding:14px 20px;">
            <span class="card-title">📅 Agenda Semanal</span>
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:12px;color:var(--accent2);font-family:'Inter',sans-serif;font-weight:500;" id="ov-agenda-filter-label"></span>
              <button class="btn btn-ghost btn-sm" onclick="goPage('calendario',document.querySelector('[onclick*=calendario]'))" style="font-size:12px;">Ver calendario →</button>
            </div>
          </div>
          <div class="card-body" style="padding:16px 20px;">
            <div id="ov-day-strip"></div>
          </div>
        </div>

        <!-- 📋 PANEL DE TAREAS Y EVENTOS - Two Column Layout -->
        <div class="overview-two-column-grid">
          <!-- 📋 PANEL DE TAREAS -->
          <div class="card" id="tasks-panel-card">
            <div class="card-header">
              <div style="display:flex;align-items:center;gap:10px;">
                <span class="card-title">⚡ Tareas Pendientes</span>
                <span style="font-size:12px;font-family:'Inter',sans-serif;color:var(--red);font-weight:600;" id="ov-pending-badge"></span>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <button class="btn btn-ghost btn-sm" id="ov-clear-filter-btn" onclick="ovClearDayFilter()" style="display:none;font-size:12px;">✕ Quitar filtro</button>
                <button class="btn btn-ghost btn-sm" onclick="goPage('tareas',document.querySelector('[onclick*=tareas]'))">Ver todas →</button>
              </div>
            </div>
            <div id="ov-tasks-list" style="max-height:560px;overflow-y:auto;"></div>
          </div>

          <!-- 🗓️ EVENTOS -->
          <div class="card" id="events-panel-card">
            <div class="card-header">
              <span class="card-title">🗓️ Centro de Control</span>
              <button class="btn btn-ghost btn-sm" onclick="goPage('calendario',document.querySelector('[onclick*=calendario]'))" style="font-size:12px;">Ver calendario →</button>
            </div>
            <!-- View Selector -->
            <div class="view-selector" style="padding:12px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;">
              <button class="view-selector-btn active" data-view="calendar" onclick="switchWidget('calendar')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;">📅 Calendario</button>
              <button class="view-selector-btn" data-view="myday" onclick="switchWidget('myday')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;">📋 Mi Día</button>
              <button class="view-selector-btn" data-view="habits" onclick="switchWidget('habits')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.2s;">🔥 Hábitos</button>
            </div>
            <div id="events-content" style="min-height:200px;">
              <!-- Calendar Widget -->
              <div id="widget-calendar" class="control-widget" style="display:none;padding:20px;">
                <div id="calendar-widget-content"></div>
              </div>

              <!-- My Day Widget -->
              <div id="widget-myday" class="control-widget" style="display:none;padding:20px;">
                <div id="myday-widget-content"></div>
              </div>

              <!-- Habits Widget -->
              <div id="widget-habits" class="control-widget" style="display:none;padding:20px;">
                <div id="habits-widget-content"></div>
              </div>

              <!-- Empty state - minimalist design (default view) -->
              <div class="events-empty-state" id="events-empty-state">
                <div class="events-empty-day" id="events-empty-day"></div>
                <div class="events-empty-month" id="events-empty-month"></div>
              </div>
              <!-- Events list will be populated by JavaScript -->
              <div id="events-list" style="display:none;"></div>
            </div>
          </div>
        </div>

        <!-- Elementos legacy -->
        <div id="ov-timeline"   style="display:none;"></div>
        <div id="ov-load-bars"  style="display:none;"></div>
        <span id="ov-week-range"   style="display:none;"></span>
        <span id="load-panel-toggle" style="display:none;"></span>
        <span id="ov-pending"  style="display:none;">0</span>
      </div>
