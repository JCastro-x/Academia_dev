      <div class="page active" id="page-overview">

        <!-- Header: greeting + micro-stats chips (top-right) -->
        <div class="mc-header">
          <div class="mc-greeting">
            <div style="font-size:10px;font-family:'Space Mono',monospace;color:var(--accent2);letter-spacing:2px;margin-bottom:4px;" id="ov-date"></div>
            <div style="font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1.2;" id="ov-greeting"></div>
            <div style="font-size:12px;color:var(--text2);margin-top:3px;" id="ov-sub"></div>
          </div>
          <!-- Live clock — top right of overview -->
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div id="ov-clock-icon" style="font-size:22px;line-height:1;filter:drop-shadow(0 0 6px rgba(255,200,50,.4));">☀️</div>
              <div id="ov-clock" style="font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:var(--text);letter-spacing:2px;line-height:1;">—</div>
            </div>
            <div id="ov-clock-ampm" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);letter-spacing:3px;text-transform:uppercase;text-align:right;">—</div>
          </div>
        </div>

        <!-- 📅 AGENDA SEMANAL RODANTE — 7 días desde hoy -->
        <div class="card" style="margin-bottom:16px;" id="agenda-card">
          <div class="card-header" style="padding:10px 16px;">
            <span class="card-title">📅 Agenda Semanal</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:11px;color:var(--accent2);font-family:'Space Mono',monospace;" id="ov-agenda-filter-label"></span>
              <button class="btn btn-ghost btn-sm" onclick="goPage('calendario',document.querySelector('[onclick*=calendario]'))" style="font-size:11px;">Ver calendario →</button>
            </div>
          </div>
          <div class="card-body" style="padding:10px 14px 14px;">
            <div id="ov-day-strip"></div>
          </div>
        </div>

        <!-- 📋 PANEL DE TAREAS DETALLADO — ancho completo -->
        <div class="card" id="tasks-panel-card">
          <div class="card-header">
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="card-title">⚡ Tareas Pendientes</span>
              <span style="font-size:11px;font-family:'Space Mono',monospace;color:var(--red);" id="ov-pending-badge"></span>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <button class="btn btn-ghost btn-sm" id="ov-clear-filter-btn" onclick="ovClearDayFilter()" style="display:none;font-size:11px;">✕ Quitar filtro</button>
              <button class="btn btn-ghost btn-sm" onclick="goPage('tareas',document.querySelector('[onclick*=tareas]'))">Ver todas →</button>
            </div>
          </div>
          <div id="ov-tasks-list" style="max-height:560px;overflow-y:auto;"></div>
        </div>

        <div class="card" style="margin-top:16px;">
          <div class="card-header">
            <span class="card-title">🗓️ Plan del Día</span>
            <button class="btn btn-ghost btn-sm" onclick="goPage('temas',document.querySelector('[onclick*=temas]'))" style="font-size:11px;">Ver repasos →</button>
          </div>
          <div id="planner-daily-plan" style="min-height:60px;"></div>
        </div>
        <!-- Elementos legacy -->
        <div id="ov-timeline"   style="display:none;"></div>
        <div id="ov-load-bars"  style="display:none;"></div>
        <span id="ov-week-range"   style="display:none;"></span>
        <span id="load-panel-toggle" style="display:none;"></span>
        <span id="ov-pending"  style="display:none;">0</span>
      </div>
