      <div class="page" id="page-pomodoro" style="display:none;">

        <!-- Botón volver al selector -->
        <div style="margin-bottom: 16px;">
          <button onclick="backToRelojSelector()" class="btn btn-ghost btn-sm" style="display:inline-flex;align-items:center;gap:6px;">
            ← Volver a Reloj
          </button>
        </div>

        <!-- ── LAYOUT: 2 Columnas ── -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

          <!-- Columna izquierda: Pomodoro -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">⏱️ Temporizador Pomodoro</span>
              <div style="display:flex;gap:8px;">
                <button id="pom-mini-toggle-btn"
                  onclick="enterFloatingMode()"
                  title="Ventana flotante — siempre visible sobre otras apps"
                  style="padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:700;color:var(--accent2);display:flex;align-items:center;gap:5px;transition:all .2s;"
                  onmouseover="this.style.background='var(--accent-glow)';this.style.borderColor='var(--accent)'"
                  onmouseout="this.style.background='var(--surface2)';this.style.borderColor='var(--border2)'">
                  ⏰ Popup
                </button>
                <button onclick="enterFocusMode()"
                  title="Modo Focus — pantalla limpia"
                  style="padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .2s;"
                  onmouseover="this.style.background='var(--accent-glow)';this.style.borderColor='var(--accent)'"
                  onmouseout="this.style.background='var(--surface2)';this.style.borderColor='var(--border2)'">
                  🔥 Focus
                </button>
                <script>
                function _pomIsRunningCheck() {
                  if (typeof pomR !== "undefined" && pomR) {
                    const p = document.getElementById("page-pomodoro");
                    if (p) p.classList.remove("active");
                    window._pomShowMiniFloat();
                    setTimeout(() => { if (p) p.classList.add("active"); }, 50);
                  } else {
                    const btn = document.getElementById("pom-mini-toggle-btn");
                    if (btn) {
                      btn.title = "⚠️ Inicia el timer primero";
                      btn.style.borderColor = "#f87171";
                      setTimeout(() => {
                        btn.title = "📟 Mini Timer";
                        btn.style.borderColor = "";
                      }, 1500);
                    }
                  }
                }
                </script>
              </div>
            </div>
            <div class="card-body">
              <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
                <div class="pom-ring">
                  <svg class="pom-svg" viewBox="0 0 190 190">
                    <circle class="pom-bg" cx="95" cy="95" r="82"/>
                    <circle class="pom-prog" id="pom-ring" cx="95" cy="95" r="82" stroke-dasharray="515" stroke-dashoffset="0"/>
                  </svg>
                  <div class="pom-center">
                    <div class="pom-time" id="pom-time">25:00</div>
                    <div class="pom-mode" id="pom-mode">ENFOQUE</div>
                  </div>
                </div>
                <div style="display:flex;gap:5px;" id="pom-dots"></div>
                <div style="display:flex;gap:10px;">
                  <button class="btn btn-ghost btn-sm" onclick="pomReset()">↺ Reset</button>
                  <button class="btn btn-primary" id="pom-btn" onclick="pomToggle()">▶ Iniciar</button>
                  <button class="btn btn-ghost btn-sm" onclick="pomSkip()">⏭ Skip</button>
                </div>
                <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
                  <div style="font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;letter-spacing:1.5px;margin-bottom:4px;">⚙️ CONFIGURACIÓN</div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <div>
                      <label for="pom-work" style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block;">Enfoque (min)</label>
                      <input type="number" id="pom-work" value="25" min="1" max="60" class="grade-input" style="width:100%;" onchange="pomReset()">
                    </div>
                    <div>
                      <label for="pom-break" style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block;">Descanso (min)</label>
                      <input type="number" id="pom-break" value="5" min="1" max="30" class="grade-input" style="width:100%;" onchange="pomReset()">
                    </div>
                    <div>
                      <label for="pom-long-break" style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block;">Desc. largo (min)</label>
                      <input type="number" id="pom-long-break" value="15" min="5" max="60" class="grade-input" style="width:100%;" onchange="pomReset()">
                    </div>
                    <div>
                      <label for="pom-cycles" style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block;">Ciclos meta</label>
                      <input type="number" id="pom-cycles" value="4" min="1" max="20" class="grade-input" style="width:100%;" oninput="renderPomGoal()">
                    </div>
                    <div>
                      <label for="pom-goal" style="font-size:11px;color:var(--text3);margin-bottom:4px;display:block;">Sesiones hoy</label>
                      <input type="number" id="pom-goal" min="1" max="20" value="4" class="grade-input" style="width:100%;" oninput="renderPomGoal()">
                    </div>
                  </div>
                  <button class="btn btn-primary" onclick="pomSavePartial()" style="width:100%;font-size:13px;font-weight:700;">💾 Guardar progreso de sesión</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Columna derecha: Racha + Sonidos -->
          <div style="display:flex;flex-direction:column;gap:8px;">

            <!-- Racha de estudio -->
            <div class="card">
              <div class="card-header"><span class="card-title">🔥 Racha de Estudio</span></div>
              <div class="card-body" style="padding:14px 18px;">
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;">
                  <div style="background:var(--surface2);border-radius:10px;padding:12px 8px;">
                    <div style="font-size:26px;font-weight:800;color:var(--orange);" id="pom-stat-streak">🔥 0</div>
                    <div style="font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:4px;">RACHA DÍAS</div>
                  </div>
                  <div style="background:var(--surface2);border-radius:10px;padding:12px 8px;">
                    <div style="font-size:26px;font-weight:800;color:var(--accent2);" id="pom-stat-week-sessions">0</div>
                    <div style="font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:4px;">SESIONES SEM.</div>
                  </div>
                  <div style="background:var(--surface2);border-radius:10px;padding:12px 8px;">
                    <div style="font-size:26px;font-weight:800;color:var(--green);" id="pom-stat-week-mins">0</div>
                    <div style="font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:4px;">MIN SEM.</div>
                  </div>
                </div>
                <div style="margin-top:12px;">
                  <div style="font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;margin-bottom:6px;">ACTIVIDAD — ÚLTIMOS 7 DÍAS</div>
                  <div style="display:flex;gap:4px;align-items:flex-end;height:40px;" id="pom-week-bars"></div>
                </div>
                <div style="margin-top:12px;">
                  <div class="prog-bar" style="margin-bottom:6px;">
                    <div class="prog-fill" id="pom-goal-bar" style="background:var(--accent2);width:0%;transition:width .4s;"></div>
                  </div>
                  <div style="font-size:11px;color:var(--text3);text-align:center;" id="pom-goal-label">0 de 4 sesiones completadas</div>
                </div>
              </div>
            </div>

            <!-- Ambiente Sonoro -->
            <div class="card">
              <div class="card-header">
                <span class="card-title">🎵 Ambiente Sonoro</span>
                <span style="font-size:11px;color:var(--text3);" id="sound-now-playing">— Sin sonido —</span>
              </div>
              <div class="card-body" style="padding:16px 18px;">
                <div style="font-size:10px;color:var(--text3);font-family:'Space Mono',monospace;letter-spacing:1.5px;margin-bottom:10px;">🌊 SONIDOS AMBIENTALES</div>
                <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px;">
                  <!-- Fila 1: Ruidos de concentración -->
                  <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="pom-music-btn" id="noise-white-btn" onclick="toggleNoise('white')" title="Ruido blanco — espectro plano">
                      <span id="noise-white-icon">▶</span> Blanco
                    </button>
                    <button class="pom-music-btn" id="noise-pink-btn" onclick="toggleNoise('pink')" title="Ruido rosa — 1/f, más natural">
                      <span id="noise-pink-icon">▶</span> 🌸 Rosa
                    </button>
                    <button class="pom-music-btn" id="noise-brown-btn" onclick="toggleNoise('brown')" title="Ruido tierra — grave y profundo">
                      <span id="noise-brown-icon">▶</span> 🟤 Tierra
                    </button>
                  </div>
                  <!-- Fila 2: Naturaleza + Atmósferas -->
                  <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="pom-music-btn" id="noise-rain-btn" onclick="toggleNoise('rain')" title="Lluvia suave">
                      <span id="noise-rain-icon">▶</span> 🌧 Lluvia
                    </button>
                    <button class="pom-music-btn" id="noise-storm-btn" onclick="toggleNoise('storm')" title="Tormenta con truenos">
                      <span id="noise-storm-icon">▶</span> ⛈ Tormenta
                    </button>
                    <button class="pom-music-btn" id="noise-fire-btn" onclick="toggleNoise('fire')" title="Fuego crepitando">
                      <span id="noise-fire-icon">▶</span> 🔥 Fuego
                    </button>
                    <button class="pom-music-btn" id="noise-forest-btn" onclick="toggleNoise('forest')" title="Bosque con pájaros">
                      <span id="noise-forest-icon">▶</span> 🌿 Bosque
                    </button>
                    <button class="pom-music-btn" id="noise-ocean-btn" onclick="toggleNoise('ocean')" title="Olas del mar">
                      <span id="noise-ocean-icon">▶</span> 🌊 Océano
                    </button>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:11px;">🔇</span>
                  <input type="range" id="noise-vol" min="0" max="100" value="30" style="flex:1;accent-color:var(--accent);cursor:pointer;" oninput="setNoiseVol(this.value)">
                  <span style="font-size:11px;">🔊</span>
                </div>
              </div>
            </div>

          </div>

        </div>

      </div>

    </div><!-- /content -->
  </div><!-- /main -->

<script>
// Inicializar pomodoro cuando se carga este partial
document.addEventListener('partial-loaded', function(e) {
  if (e.detail && e.detail.name === 'p-reloj-pomodoro') {
    setTimeout(() => {
      // Cargar configuraciones guardadas
      if (typeof loadPomSettings === 'function') loadPomSettings();
      // Inicializar selectores y renderizar historial/meta
      if (typeof renderPomHistory === 'function') renderPomHistory();
      if (typeof renderPomGoal === 'function') renderPomGoal();
      if (typeof updatePomDots === 'function') updatePomDots();
      // Restaurar estado corriendo sin reiniciar
      if (typeof restorePomRunningState === 'function') restorePomRunningState();
    }, 150);
  }
});
</script>
