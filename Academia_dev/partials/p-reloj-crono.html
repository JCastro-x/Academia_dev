<!-- ═══════════════════════════════════════════════════════════════════════
     PÁGINA: CRONÓMETRO — Cuenta hacia arriba
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="page" id="page-cronometro" style="display:none;">
  <!-- Botón volver al selector -->
  <div style="margin-bottom: 16px;">
    <button onclick="backToRelojSelector()" class="btn btn-ghost btn-sm" style="display:inline-flex;align-items:center;gap:6px;">
      ← Volver a Reloj
    </button>
  </div>

  <div class="chrono-container">
    <!-- Display principal -->
    <div class="chrono-display">
      <div class="chrono-time" id="chrono-display">00:00:00</div>
      <div class="chrono-label">Cronómetro</div>
    </div>

    <!-- Controles -->
    <div class="chrono-controls">
      <button id="chrono-start-btn" class="btn btn-primary btn-lg" onclick="startChrono()">
        ▶ Iniciar
      </button>
      <button id="chrono-pause-btn" class="btn btn-ghost btn-lg" onclick="pauseChrono()" style="display:none;">
        ⏸ Pausar
      </button>
      <button id="chrono-stop-btn" class="btn btn-ghost btn-lg" onclick="stopChrono()" disabled>
        ⏹ Detener
      </button>
      <button id="chrono-reset-btn" class="btn btn-ghost btn-lg" onclick="resetChrono()" disabled>
        ↺ Reiniciar
      </button>
    </div>

    <!-- Vueltas -->
    <div class="chrono-laps-section">
      <div class="laps-header">
        <h3>Vueltas</h3>
        <button id="chrono-lap-btn" class="btn btn-ghost btn-sm" onclick="addLap()" disabled>
          ⏱ Marcar vuelta
        </button>
      </div>
      <div class="laps-list" id="chrono-laps">
        <div class="laps-empty">Sin vueltas registradas</div>
      </div>
    </div>

    <!-- Historial de sesiones -->
    <div class="chrono-history-section">
      <h3>Historial de sesiones</h3>
      <div class="chrono-sessions" id="chrono-sessions">
        <!-- Se llena dinámicamente -->
      </div>
    </div>
  </div>
</div>
