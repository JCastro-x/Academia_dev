<!-- ═══════════════════════════════════════════════════════════════════════
     PÁGINA: TEMPORIZADOR — Cuenta regresiva personalizable
     ═══════════════════════════════════════════════════════════════════════ -->

<div class="page" id="page-temporizador" style="display:none;">
  <!-- Botón volver al selector -->
  <div style="margin-bottom: 16px;">
    <button onclick="backToRelojSelector()" class="btn btn-ghost btn-sm" style="display:inline-flex;align-items:center;gap:6px;">
      ← Volver a Reloj
    </button>
  </div>

  <div class="timer-container">
    <!-- Configuración (visible cuando no está corriendo) -->
    <div id="timer-config" class="timer-config">
      <h2>⏳ Configurar Temporizador</h2>
      
      <!-- Presets rápidos -->
      <div class="timer-presets">
        <button class="preset-btn" onclick="setTimerPreset(5)">5 min</button>
        <button class="preset-btn" onclick="setTimerPreset(10)">10 min</button>
        <button class="preset-btn" onclick="setTimerPreset(15)">15 min</button>
        <button class="preset-btn" onclick="setTimerPreset(25)">25 min</button>
        <button class="preset-btn" onclick="setTimerPreset(30)">30 min</button>
        <button class="preset-btn" onclick="setTimerPreset(45)">45 min</button>
        <button class="preset-btn" onclick="setTimerPreset(60)">60 min</button>
        <button class="preset-btn" onclick="setTimerPreset(90)">90 min</button>
      </div>

      <!-- Inputs personalizados -->
      <div class="timer-inputs">
        <div class="time-input-group">
          <label>Horas</label>
          <input type="number" id="timer-hours" min="0" max="23" value="0" placeholder="00">
        </div>
        <div class="time-input-group">
          <label>Minutos</label>
          <input type="number" id="timer-minutes" min="0" max="59" value="0" placeholder="00">
        </div>
        <div class="time-input-group">
          <label>Segundos</label>
          <input type="number" id="timer-seconds" min="0" max="59" value="0" placeholder="00">
        </div>
      </div>

      <button class="btn btn-primary btn-lg" onclick="startTimer()" style="width:100%;margin-top:20px;">
        ▶ Iniciar Temporizador
      </button>
    </div>

    <!-- Display en ejecución (visible cuando está corriendo) -->
    <div id="timer-running" class="timer-running" style="display:none;">
      <div class="timer-display-section">
        <div class="timer-display" id="timer-display">00:00:00</div>
        <div class="timer-label" id="timer-status">Tiempo restante</div>
      </div>

      <!-- Barra de progreso -->
      <div class="timer-progress-container">
        <div class="timer-progress-bar" id="timer-progress"></div>
      </div>

      <!-- Controles -->
      <div class="timer-controls">
        <button id="timer-pause-btn" class="btn btn-ghost btn-lg" onclick="pauseTimer()">
          ⏸ Pausar
        </button>
        <button id="timer-resume-btn" class="btn btn-primary btn-lg" onclick="resumeTimer()" style="display:none;">
          ▶ Reanudar
        </button>
        <button class="btn btn-ghost btn-lg" onclick="resetTimer()">
          ↺ Cancelar
        </button>
      </div>

      <!-- Agregar tiempo rápido -->
      <div class="timer-quick-add">
        <span>Agregar:</span>
        <button class="btn btn-sm" onclick="addTimerTime(1)">+1 min</button>
        <button class="btn btn-sm" onclick="addTimerTime(5)">+5 min</button>
        <button class="btn btn-sm" onclick="addTimerTime(10)">+10 min</button>
      </div>
    </div>

    <!-- Historial -->
    <div class="timer-history">
      <h3>Historial de temporizadores</h3>
      <div id="timer-history-list">
        <div class="history-empty">Sin temporizadores completados</div>
      </div>
    </div>
  </div>
</div>

<style>
/* ═══════════════════════════════════════════════════════════════════════
   ESTILOS: Temporizador
   ═══════════════════════════════════════════════════════════════════════ */

.timer-container {
  max-width: 500px;
  margin: 0 auto;
  padding: 20px 0;
}

.timer-config {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 24px;
}

.timer-config h2 {
  margin: 0 0 24px 0;
  font-size: 20px;
  text-align: center;
}

/* Presets */
.timer-presets {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}

.preset-btn {
  padding: 12px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  transition: all 0.2s;
}

.preset-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Inputs */
.timer-inputs {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.time-input-group {
  flex: 1;
  text-align: center;
}

.time-input-group label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.time-input-group input {
  width: 100%;
  padding: 16px;
  font-size: 28px;
  font-family: 'Space Mono', monospace;
  text-align: center;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--text);
}

.time-input-group input:focus {
  outline: none;
  border-color: var(--accent);
}

/* Running display */
.timer-running {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 28px;
  margin-bottom: 24px;
}

.timer-display-section {
  text-align: center;
  margin-bottom: 24px;
}

.timer-display {
  font-family: 'Space Mono', monospace;
  font-size: 64px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 4px;
}

.timer-label {
  font-size: 14px;
  color: var(--text2);
  margin-top: 8px;
}

/* Progress bar */
.timer-progress-container {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 32px;
}

.timer-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 4px;
  transition: width 1s linear;
}

.timer-progress-bar.warning {
  background: linear-gradient(90deg, #fbbf24, #f59e0b);
}

.timer-progress-bar.danger {
  background: linear-gradient(90deg, #f87171, #ef4444);
}

/* Controls */
.timer-controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 24px;
}

.timer-quick-add {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

.timer-quick-add span {
  font-size: 13px;
  color: var(--text2);
}

/* History */
.timer-history {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.timer-history h3 {
  margin: 0 0 16px 0;
  font-size: 16px;
}

.history-empty {
  text-align: center;
  color: var(--text3);
  padding: 20px;
  font-size: 13px;
}

.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 8px;
}

.history-item:last-child {
  margin-bottom: 0;
}

.history-date {
  font-size: 13px;
  color: var(--text2);
}

.history-duration {
  font-family: 'Space Mono', monospace;
  font-weight: 600;
  color: var(--accent);
}

/* Animación de alarma */
@keyframes timerAlarm {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.timer-running.alarm {
  animation: timerAlarm 0.5s ease infinite;
  border-color: #f87171;
}

/* Responsive */
@media (max-width: 480px) {
  .timer-presets {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .timer-display {
    font-size: 44px;
  }
  
  .time-input-group input {
    font-size: 22px;
    padding: 12px;
  }
}
</style>
