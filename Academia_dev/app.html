<!-- ═══════════════════════════════════════════════════════════════
     ACADEMIA ANALYTICS TRACKER
     Pegá esto antes del </body> en: index.html (landing) y app.html
     Detecta dispositivo y registra la visita de forma anónima.
     NO guarda IP ni datos personales.
═══════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // No trackear si es el propio admin (opcional: agregá tu dominio local)
  if (window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1') return;

  const SUPABASE_URL      = 'https://mwzezekdxrutpzqbduvh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_O1RMAV7hbpvDwJj0ESgaCg_dd8lZur5';

  // Detectar página actual
  const path = window.location.pathname;
  let page = 'other';
  if (path === '/' || path.includes('index'))    page = 'landing';
  else if (path.includes('app'))                 page = 'app';
  else if (path.includes('auth'))                page = 'auth';

  // Detectar dispositivo
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const device   = isMobile ? 'mobile' : 'desktop';

  // Referrer limpio (sin datos sensibles)
  let referrer = '';
  try {
    const ref = document.referrer;
    if (ref) referrer = new URL(ref).hostname;
  } catch(e) {}

  // Registrar visita — fire and forget, no bloquea nada
  fetch(`${SUPABASE_URL}/rest/v1/page_views`, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'apikey':        SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Prefer':        'return=minimal'
    },
    body: JSON.stringify({ page, device, referrer })
  }).catch(() => {}); // silencioso si falla

})();
</script>

<script>
(function() {
  'use strict';
  if (window.location.hostname === 'localhost' ||
      window.location.hostname === '127.0.0.1') return;

  // Evitar doble tracking en la misma sesión de pestaña
  if (sessionStorage.getItem('_tracked')) return;
  sessionStorage.setItem('_tracked', '1');

  const SUPABASE_URL      = 'https://mwzezekdxrutpzqbduvh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_O1RMAV7hbpvDwJj0ESgaCg_dd8lZur5';

  const path = window.location.pathname;
  let page = 'other';
  if (path === '/' || path.includes('index'))  page = 'landing';
  else if (path.includes('app'))               page = 'app';
  else if (path.includes('auth'))              page = 'auth';
  else if (path.includes('admin'))             page = 'admin';

  // Detección de móvil mejorada
  const ua = navigator.userAgent;
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile|CriOS/i.test(ua)
    || (navigator.maxTouchPoints > 1 && /Macintosh/.test(ua)) // iPad moderno
    || window.innerWidth <= 768;
  const device = isMobile ? 'mobile' : 'desktop';

  let referrer = '';
  try {
    const ref = document.referrer;
    if (ref) referrer = new URL(ref).hostname;
  } catch(e) {}

  fetch(`${SUPABASE_URL}/rest/v1/page_views`, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'apikey':        SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Prefer':        'return=minimal'
    },
    body: JSON.stringify({ page, device, referrer })
  }).catch(() => {});
})();
</script>
