<!DOCTYPE html>
<html>
<head>
    <title>Check Gemini Models</title>
</head>
<body>
    <h1>Check Available Gemini Models</h1>
    <input type="text" id="apiKey" placeholder="Enter your new API key" style="width: 400px; padding: 10px;">
    <button onclick="checkModels()" style="padding: 10px;">Check Models</button>
    <pre id="results"></pre>

    <script>
        async function checkModels() {
            const apiKey = document.getElementById('apiKey').value;
            const results = document.getElementById('results');
            
            if (!apiKey) {
                results.textContent = 'Please enter an API key';
                return;
            }

            results.textContent = 'Checking available models...';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                
                if (data.models) {
                    results.textContent = JSON.stringify(data.models, null, 2);
                } else {
                    results.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                results.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
